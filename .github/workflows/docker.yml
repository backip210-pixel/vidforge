name: Build and publish Docker image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/backip210-pixel/vidforge:latest
            ghcr.io/backip210-pixel/vidforge:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=VidForge
            org.opencontainers.image.description=Containerised FFmpeg render queue for ZimaOS and home servers
            org.opencontainers.image.source=https://github.com/backip210-pixel/vidforge
            org.opencontainers.image.url=https://github.com/backip210-pixel/vidforge
