services:
  vidforge:
    # Default deployment: run the prebuilt container image published by GitHub Actions.
    # No source checkout or local Docker build is required once the GHCR package exists.
    image: ghcr.io/backip210-pixel/vidforge:latest
    container_name: vidforge
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      # Optional AMD/Intel VAAPI hardware encode support on Linux/ZimaOS.
      # Uncomment this and choose "VAAPI" in the VidForge UI.
      # - /dev/dri:/dev/dri
    environment:
      APP_DATA_DIR: /data
      APP_PORT: 8080
      TEMP_MAX_AGE_HOURS: 12
      # Optional basic auth. Leave unset for LAN-only dashboard access.
      # APP_USERNAME: admin
      # APP_PASSWORD: change-me
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      org.opencontainers.image.title: "VidForge"
      org.opencontainers.image.description: "Containerised FFmpeg render queue for ZimaOS and home servers"
      org.opencontainers.image.source: "https://github.com/backip210-pixel/vidforge"
      org.opencontainers.image.url: "https://github.com/backip210-pixel/vidforge"
      org.opencontainers.image.documentation: "https://github.com/backip210-pixel/vidforge#readme"
      casaos.name: "VidForge"
      casaos.category: "Media"
      casaos.webui: "http://[HOST]:[PORT:8080]"
      casaos.icon: "https://raw.githubusercontent.com/backip210-pixel/vidforge/main/app/static/logo.svg"

# ZimaOS/CasaOS-style metadata. Docker Compose safely ignores x-* extension fields.
x-casaos:
  architectures:
    - amd64
    - arm64
  main: vidforge
  author: backip210-pixel
  category: Media
  developer: backip210-pixel
  icon: https://raw.githubusercontent.com/backip210-pixel/vidforge/main/app/static/logo.svg
  screenshot_link:
    - https://raw.githubusercontent.com/backip210-pixel/vidforge/main/docs/screenshots/dashboard.svg
    - https://raw.githubusercontent.com/backip210-pixel/vidforge/main/docs/screenshots/mobile.svg
  tagline:
    en_us: FFmpeg render queue for ZimaOS
  title:
    en_us: VidForge
  description:
    en_us: Upload images, videos, music and captions, queue FFmpeg compilation jobs, track progress and download completed MP4 renders.
  port_map: "8080"
  scheme: http
