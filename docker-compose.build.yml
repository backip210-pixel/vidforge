services:
  vidforge:
    # Developer/source build. Use this if you want to build locally instead of pulling GHCR.
    build: .
    image: vidforge:local
    container_name: vidforge
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      # - /dev/dri:/dev/dri
    environment:
      APP_DATA_DIR: /data
      APP_PORT: 8080
      TEMP_MAX_AGE_HOURS: 12
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
